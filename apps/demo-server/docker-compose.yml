services:
  postgres:
    image: postgres:17-alpine
    container_name: octabits-demo-postgres
    environment:
      POSTGRES_USER: demo
      POSTGRES_PASSWORD: demo
      POSTGRES_DB: demo
    ports:
      - '5433:5432'
    volumes:
      - demo-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U demo -d demo']
      interval: 2s
      timeout: 2s
      retries: 15

volumes:
  demo-pgdata:
