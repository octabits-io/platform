name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref (e.g. rapid pushes to a PR).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: typecheck · test · build
    runs-on: ubuntu-latest
    # Docker is preinstalled and running on ubuntu-latest, so the
    # testcontainers-based integration tests (flow, queue) work out of the box.
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        # Version is read from the root package.json "packageManager" field.
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm run typecheck

      - name: Test
        run: pnpm run test

      - name: Build
        run: pnpm run build
